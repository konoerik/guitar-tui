# Extended chord voicings — sus, add, and power chords
#
# frets: [string6, string5, string4, string3, string2, string1]
#         low E    A        D        G        B        high e
# 0 = open string, null = muted (X)
# fingers: 1=index, 2=middle, 3=ring, 4=pinky, null = no finger label
#
# Sus chords  — replace the 3rd with 2nd (sus2) or 4th (sus4)
# Add chords  — keep the 3rd, add the 9th (add9)
# Power chords — root + 5th (+ octave root); no 3rd, works as major or minor

chords:

  # ════════════════════════════════════════════════════════════════════════════
  # SUS2 CHORDS  (intervals: 1 – 2 – 5)
  # ════════════════════════════════════════════════════════════════════════════

  - name: Dsus2
    full_name: D suspended 2nd
    frets: [null, null, 0, 2, 3, 0]
    fingers: [null, null, null, 1, 3, null]

  - name: Asus2
    full_name: A suspended 2nd
    frets: [null, 0, 2, 2, 0, 0]
    fingers: [null, null, 1, 2, null, null]

  # ════════════════════════════════════════════════════════════════════════════
  # SUS4 CHORDS  (intervals: 1 – 4 – 5)
  # ════════════════════════════════════════════════════════════════════════════

  - name: Dsus4
    full_name: D suspended 4th
    frets: [null, null, 0, 2, 3, 3]
    fingers: [null, null, null, 1, 3, 4]

  - name: Asus4
    full_name: A suspended 4th
    frets: [null, 0, 2, 2, 3, 0]
    fingers: [null, null, 1, 2, 3, null]

  - name: Esus4
    full_name: E suspended 4th
    frets: [0, 2, 2, 2, 0, 0]
    fingers: [null, 1, 2, 3, null, null]

  - name: Gsus4
    full_name: G suspended 4th
    frets: [3, 3, 0, 0, 3, 3]
    fingers: [2, 3, null, null, 1, 4]

  # ════════════════════════════════════════════════════════════════════════════
  # ADD9 CHORDS  (intervals: 1 – 3 – 5 – 9)
  # The 3rd is kept; the 9th/2nd is added alongside it.
  # ════════════════════════════════════════════════════════════════════════════

  - name: Cadd9
    full_name: C add 9
    frets: [null, 3, 2, 0, 3, 0]
    fingers: [null, 3, 2, null, 4, null]

  - name: Gadd9
    full_name: G add 9
    frets: [3, 2, 0, 2, 3, null]
    fingers: [3, 1, null, 2, 4, null]

  # ════════════════════════════════════════════════════════════════════════════
  # POWER CHORDS  (intervals: 1 – 5 – 8)
  # No 3rd — sounds heavy and neutral (neither major nor minor).
  # Open-position voicings with octave root on third string.
  # ════════════════════════════════════════════════════════════════════════════

  - name: E5
    full_name: E power chord
    frets: [0, 2, 2, null, null, null]
    fingers: [null, 1, 2, null, null, null]

  - name: A5
    full_name: A power chord
    frets: [null, 0, 2, 2, null, null]
    fingers: [null, null, 1, 2, null, null]

  - name: D5
    full_name: D power chord
    frets: [null, null, 0, 2, 3, null]
    fingers: [null, null, null, 1, 3, null]

  # ─── Moveable power chord shapes ─────────────────────────────────────────
  # frets are RELATIVE: 1 = base_fret; base_fret is the root fret on the
  # root string.  To play in any key, move base_fret to the target root.

  - name: G5
    full_name: G power chord
    base_fret: 3
    frets: [1, 3, 3, null, null, null]
    fingers: [1, 3, 4, null, null, null]

  - name: C5
    full_name: C power chord
    base_fret: 3
    frets: [null, 1, 3, 3, null, null]
    fingers: [null, 1, 3, 4, null, null]
