# Open chord voicings — standard tuning
#
# frets: [string6, string5, string4, string3, string2, string1]
#         low E    A        D        G        B        high e
# 0 = open string, null = muted (X)
# fingers: 1=index, 2=middle, 3=ring, 4=pinky, null = no finger label

chords:
  - name: Am
    full_name: A minor
    frets: [null, 0, 2, 2, 1, 0]
    fingers: [null, null, 2, 3, 1, null]

  - name: A
    full_name: A major
    frets: [null, 0, 2, 2, 2, 0]
    fingers: [null, null, 1, 2, 3, null]

  - name: Bm
    full_name: B minor
    frets: [null, 2, 4, 4, 3, 2]
    fingers: [null, 1, 3, 4, 2, 1]
    base_fret: 1
    barre:
      fret: 2
      from_string: 1
      to_string: 5
      finger: 1

  - name: C
    full_name: C major
    frets: [null, 3, 2, 0, 1, 0]
    fingers: [null, 3, 2, null, 1, null]

  - name: D
    full_name: D major
    frets: [null, null, 0, 2, 3, 2]
    fingers: [null, null, null, 1, 3, 2]

  - name: Dm
    full_name: D minor
    frets: [null, null, 0, 2, 3, 1]
    fingers: [null, null, null, 2, 3, 1]

  - name: E
    full_name: E major
    frets: [0, 2, 2, 1, 0, 0]
    fingers: [null, 2, 3, 1, null, null]

  - name: Em
    full_name: E minor
    frets: [0, 2, 2, 0, 0, 0]
    fingers: [null, 2, 3, null, null, null]

  - name: F
    full_name: F major
    frets: [1, 3, 3, 2, 1, 1]
    fingers: [1, 3, 4, 2, 1, 1]
    base_fret: 1
    barre:
      fret: 1
      from_string: 1
      to_string: 6
      finger: 1

  - name: G
    full_name: G major
    frets: [3, 2, 0, 0, 0, 3]
    fingers: [2, 1, null, null, null, 3]
