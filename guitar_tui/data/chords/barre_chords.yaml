# Barre chord voicings — E-shape and A-shape
#
# All frets are RELATIVE: 1 = first displayed row = base_fret (actual fret).
# base_fret is the fret number where the barre is placed.
#
# E-shape major pattern:  frets [1, 3, 3, 2, 1, 1]   root on string 6
# E-shape minor pattern:  frets [1, 3, 3, 1, 1, 1]   root on string 6
# A-shape major pattern:  frets [null, 1, 3, 3, 3, 1] root on string 5
# A-shape minor pattern:  frets [null, 1, 3, 3, 2, 1] root on string 5
#
# String numbering: 1 = high e, 6 = low E
# DataLoader merges these voicings with open_chords.yaml entries by chord name.

