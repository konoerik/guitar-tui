  # ════════════════════════════════════════════════════════════════════════════
  # E-SHAPE MAJOR (root on string 6)
  # Barre fret by root: F=1 F#=2 G=3 Ab=4 A=5 Bb=6 B=7 C=8 Db=9 D=10 Eb=11 E=12
  # ════════════════════════════════════════════════════════════════════════════

  - name: F
    full_name: F major
    voicings:
      - id: e_shape
        label: E-shape barre (1st fret)
        base_fret: 1
        frets: [1, 3, 3, 2, 1, 1]
        fingers: [1, 3, 4, 2, 1, 1]
        barre: {fret: 1, from_string: 1, to_string: 6, finger: 1}

