# Diminished triad voicings — moveable A-string-root shape
#
# One shape covers all 12 diminished chords: root on the A string,
# frets (relative) [x, 1, 2, 3, 2, x] — the same voicing the curriculum
# teaches as B° (x2343x) in major_scale_chords.md.
# Intervals sounded: 1 – b5 – 1 – b3 (the octave root replaces the
# doubled 3rd of open shapes; all three chord tones are present).
#
# All frets are RELATIVE: 1 = first displayed row = base_fret, except A°
# which uses the open A string in first position.
#
# Names use the same spellings keys.py generates for diatonic vii°/ii°
# chords (C#, Eb, F#, Ab, Bb).

chords:

  - name: A°
    full_name: A diminished
    voicings:
      - id: dim_shape
        label: Dim shape (open position)
        base_fret: 1
        frets: [null, 0, 1, 2, 1, null]
        fingers: [null, null, 1, 3, 2, null]

  - name: Bb°
